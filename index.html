// ---------------------------------------------------------------------------
// Model constants (language-independent)
// ---------------------------------------------------------------------------
const DEFAULT_SURVIVAL = { s1: 95, s2: 90, s3: 72, s4: 18 };
const DEFAULT_COSTS    = { s1: 25000, s2: 35000, s3: 55000, s4: 75000 };

const PRESET_KEYS = ["peru_current", "peru_covid", "bogi_no_ed", "bogi_with_ed", "dev_target", "zelle_2013"];

const PRESET_STAGES = {
  peru_current: { s1: 10, s2: 15, s3: 40, s4: 35 },
  peru_covid:   { s1: 8,  s2: 12, s3: 35, s4: 45 },
  bogi_no_ed:   { s1: 5,  s2: 5,  s3: 25, s4: 65 },
  bogi_with_ed: { s1: 40, s2: 40, s3: 15, s4: 5  },
  dev_target:   { s1: 45, s2: 35, s3: 15, s4: 5  },
  zelle_2013:   { s1: 30, s2: 35, s3: 25, s4: 10 }
};

const LEVER_IDS = ["sms", "telemammo", "nav", "ai"];

const LEVER_EFFECTS = {
  sms:       { conservative: { shift: 3, costDelta: 0.5 }, central: { shift: 5, costDelta: 0.8 }, optimistic: { shift: 9,  costDelta: 1.2 } },
  telemammo: { conservative: { shift: 4, costDelta: -2  }, central: { shift: 7, costDelta: -3  }, optimistic: { shift: 11, costDelta: -5  } },
  nav:       { conservative: { shift: 2, costDelta: 0.3 }, central: { shift: 4, costDelta: 0.5 }, optimistic: { shift: 6,  costDelta: 0.8 } },
  ai:        { conservative: { shift: 1, costDelta: -1  }, central: { shift: 3, costDelta: -3  }, optimistic: { shift: 5,  costDelta: -6  } }
};

// ---------------------------------------------------------------------------
// Helpers
// ---------------------------------------------------------------------------
const fmt = (n, locale, digits = 0) => n.toLocaleString(locale, {
  minimumFractionDigits: digits, maximumFractionDigits: digits
});
const fmtM = (n, locale) => `US$ ${fmt(n / 1_000_000, locale, 1)} M`;
const fmtK = (n, locale) => `US$ ${fmt(n / 1_000, locale, 0)} K`;
const pctSum = (s) => s.s1 + s.s2 + s.s3 + s.s4;

function normalize100(s) {
  const total = pctSum(s);
  if (total === 0) return { s1: 25, s2: 25, s3: 25, s4: 25 };
  return { s1: s.s1 / total * 100, s2: s.s2 / total * 100, s3: s.s3 / total * 100, s4: s.s4 / total * 100 };
}

function runScenario(scen, totalCases) {
  const s = normalize100(scen.stages);
  const cases = {
    s1: s.s1 / 100 * totalCases, s2: s.s2 / 100 * totalCases,
    s3: s.s3 / 100 * totalCases, s4: s.s4 / 100 * totalCases
  };
  const survivors =
    cases.s1 * scen.survival.s1 / 100 + cases.s2 * scen.survival.s2 / 100 +
    cases.s3 * scen.survival.s3 / 100 + cases.s4 * scen.survival.s4 / 100;
  const cost =
    cases.s1 * scen.costs.s1 + cases.s2 * scen.costs.s2 +
    cases.s3 * scen.costs.s3 + cases.s4 * scen.costs.s4;
  return { cases, survivors, deaths: totalCases - survivors, cost, survivalRate: survivors / totalCases * 100, normalized: s };
}

          {s[k] >= 8 ? `${s[k].toFixed(0)}%` : ""}

}

  const updateCost     = (k, v) => setScen({ ...scen, costs:    { ...scen.costs,    [k]: v } });

    <div className={`rounded-xl border-2 p-4 shadow-sm ${tint}`}>

function DigitalLeverPanel({ target, setTarget, baseline, t }) {
  const [intensity, setIntensity] = useState({ sms: "off", telemammo: "off", nav: "off", ai: "off" });
  const applyLevers = (newIntensity) => {
    let stages = { ...baseline.stages };
    let costs  = { ...baseline.costs };
    let totalShift = 0, totalCostDelta = 0;
    LEVER_IDS.forEach((id) => {
      const lvl = newIntensity[id];
      if (lvl && lvl !== "off") {
        totalShift     += LEVER_EFFECTS[id][lvl].shift;
        totalCostDelta += LEVER_EFFECTS[id][lvl].costDelta;
      }
    });
    const lateAvailable = stages.s3 + stages.s4;
    totalShift = Math.min(totalShift, lateAvailable);
    const lateScale  = lateAvailable > 0 ? 1 - totalShift / lateAvailable : 1;
    const earlyScale = stages.s1 + stages.s2 > 0 ? 1 + totalShift / (stages.s1 + stages.s2) : 1;
    stages = {
      s1: stages.s1 * earlyScale, s2: stages.s2 * earlyScale,
      s3: stages.s3 * lateScale,  s4: stages.s4 * lateScale
    };
    const costFactor = 1 + totalCostDelta / 100;
    costs = {
      s1: Math.max(0, costs.s1 * costFactor), s2: Math.max(0, costs.s2 * costFactor),
      s3: Math.max(0, costs.s3 * costFactor), s4: Math.max(0, costs.s4 * costFactor)
    };
    setTarget({ ...target, stages: normalize100(stages), costs });
  };
  const setLever = (id, lvl) => {
    const next = { ...intensity, [id]: lvl };
    setIntensity(next);
    applyLevers(next);
  };
  const reset = () => {
    setIntensity({ sms: "off", telemammo: "off", nav: "off", ai: "off" });
    setTarget({ ...target, stages: { ...baseline.stages }, costs: { ...baseline.costs } });
  };
  return (
    <div className="rounded-xl border-2 border-indigo-200 bg-indigo-50/50 p-4 shadow-sm">
      <div className="mb-2 flex items-center justify-between">
        <h3 className="text-base font-bold text-indigo-900">{t.digitalLevers}</h3>
        <button onClick={reset}
          className="rounded bg-indigo-200 px-2 py-0.5 text-xs font-semibold text-indigo-900 hover:bg-indigo-300">
          {t.resetTarget}
        </button>
      </div>
      <p className="mb-3 text-xs text-indigo-700">{t.digitalLeversDesc}</p>
      <div className="space-y-2">
        {LEVER_IDS.map((id) => (
          <div key={id} className="rounded-md bg-white/80 p-2">
            <div className="flex items-center justify-between">
              <div className="text-sm font-semibold text-slate-800" title={t.levers[id].evidence}>
                {t.levers[id].name}
              </div>
              <div className="flex gap-1">
                {["off", "conservative", "central", "optimistic"].map((lvl) => (
                  <button key={lvl} onClick={() => setLever(id, lvl)}
                    title={t.levelsFull[lvl]}
                    className={`rounded px-2 py-0.5 text-xs font-medium ${
                      intensity[id] === lvl
                        ? "bg-indigo-600 text-white"
                        : "bg-slate-100 text-slate-700 hover:bg-slate-200"
                    }`}>
                    {t.levels[lvl]}
                  </button>
                ))}
              </div>
            </div>
            <div className="mt-1 text-xs text-slate-500">{t.levers[id].evidence}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

function App() {
  const [lang, setLang] = useState("es");
  const t = I18N[lang];
  const locale = t.locale;

  const [population, setPopulation] = useState(1_300_000);
  const [incidenceRate, setIncidenceRate] = useState(92);
  const [dalyPerDeath, setDalyPerDeath] = useState(20);

  const [baseline, setBaseline] = useState({
    stages: { ...PRESET_STAGES.peru_current }, survival: { ...DEFAULT_SURVIVAL }, costs: { ...DEFAULT_COSTS }
  });
  const [target, setTarget] = useState({
    stages: { ...PRESET_STAGES.zelle_2013 }, survival: { ...DEFAULT_SURVIVAL }, costs: { ...DEFAULT_COSTS }
  });

  const totalCases = Math.round(population * incidenceRate / 100_000);
  const baseRun   = useMemo(() => runScenario(baseline, totalCases), [baseline, totalCases]);
  const targetRun = useMemo(() => runScenario(target,   totalCases), [target,   totalCases]);

  const livesSaved  = targetRun.survivors - baseRun.survivors;
  const costDelta   = targetRun.cost - baseRun.cost;
  const costPerLife = livesSaved > 0 ? costDelta / livesSaved : null;
  const dalyAverted = livesSaved * dalyPerDeath;
  const costPerDaly = dalyAverted > 0 ? costDelta / dalyAverted : null;
  const peruGdpPc   = 8200;
  const threshold1x = peruGdpPc;
  const threshold3x = peruGdpPc * 3;

  const applyPreset = (target_, key) => {
    const stages = PRESET_STAGES[key];
    const setter = target_ === "baseline" ? setBaseline : setTarget;
    const cur    = target_ === "baseline" ? baseline   : target;
    setter({ ...cur, stages: { ...stages } });
  };

  return (
    <div className="mx-auto max-w-7xl px-4 py-6">
      {/* Header */}
      <header className="mb-4 border-b border-slate-200 pb-4">
        <div className="flex flex-col gap-2 sm:flex-row sm:items-end sm:justify-between">
          <div>
            <h1 className="text-2xl font-bold text-slate-900">{t.title}</h1>
            <p className="text-sm text-slate-600">{t.subtitle}</p>
          </div>
          <div className="no-print flex gap-2">
            <div className="flex items-center gap-1 rounded-lg border border-slate-300 bg-white p-0.5 text-xs">
              <button onClick={() => setLang("es")}
                className={`rounded px-2 py-1 font-semibold ${lang === "es" ? "bg-slate-800 text-white" : "text-slate-700 hover:bg-slate-100"}`}>
                ES
              </button>
              <button onClick={() => setLang("en")}
                className={`rounded px-2 py-1 font-semibold ${lang === "en" ? "bg-slate-800 text-white" : "text-slate-700 hover:bg-slate-100"}`}>
                EN
              </button>
            </div>
            <button onClick={() => window.print()}
              className="rounded bg-slate-800 px-3 py-1.5 text-sm font-semibold text-white hover:bg-slate-700">
              {t.printPdf}
            </button>
          </div>
        </div>
      </header>

      {/* Epi inputs */}
      <section className="mb-4 rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
        <div className="grid grid-cols-1 gap-3 sm:grid-cols-4">
          <div>
            <label className="block text-xs font-semibold text-slate-600">{t.population}</label>
            <input type="number" value={population} min={10000} step={50000}
              onChange={(e) => setPopulation(Number(e.target.value))}
              className="mt-1 w-full rounded border border-slate-300 px-2 py-1" />
          </div>
          <div>
            <label className="block text-xs font-semibold text-slate-600">{t.incidence}</label>
            <input type="number" value={incidenceRate} min={1} step={1}
              onChange={(e) => setIncidenceRate(Number(e.target.value))}
              className="mt-1 w-full rounded border border-slate-300 px-2 py-1" />
            <div className="mt-1 text-xs text-slate-500">{t.incidenceNote}</div>
          </div>
          <div>
            <label className="block text-xs font-semibold text-slate-600">{t.dalyPerDeath}</label>
            <input type="number" value={dalyPerDeath} min={1} max={60} step={1}
              onChange={(e) => setDalyPerDeath(Number(e.target.value))}
              className="mt-1 w-full rounded border border-slate-300 px-2 py-1" />
            <div className="mt-1 text-xs text-slate-500">{t.dalyNote}</div>
          </div>
          <div className="rounded bg-slate-50 p-2 text-center">
            <div className="text-xs font-semibold text-slate-500">{t.annualCases}</div>
            <div className="text-2xl font-bold text-slate-900">{fmt(totalCases, locale)}</div>
            <div className="text-xs text-slate-500">{t.annualCasesFormula}</div>
          </div>
        </div>
      </section>

      {/* Preset bar */}
      <section className="mb-4">
        <div className="flex flex-col gap-2 sm:flex-row">
          <div className="flex-1 rounded-xl border border-rose-200 bg-rose-50/50 p-3">
            <div className="mb-2 text-xs font-bold uppercase tracking-wide text-rose-800">{t.loadBaseline}</div>
            <div className="flex flex-wrap gap-1">
              {PRESET_KEYS.map((key) => (
                <button key={key} onClick={() => applyPreset("baseline", key)} title={t.presets[key].note}
                  className="rounded bg-white px-2 py-1 text-xs font-medium text-rose-900 hover:bg-rose-100 border border-rose-200">
                  {t.presets[key].name}
                </button>
              ))}
            </div>
          </div>
          <div className="flex-1 rounded-xl border border-emerald-200 bg-emerald-50/50 p-3">
            <div className="mb-2 text-xs font-bold uppercase tracking-wide text-emerald-800">{t.loadTarget}</div>
            <div className="flex flex-wrap gap-1">
              {PRESET_KEYS.map((key) => (
                <button key={key} onClick={() => applyPreset("target", key)} title={t.presets[key].note}
                  className="rounded bg-white px-2 py-1 text-xs font-medium text-emerald-900 hover:bg-emerald-100 border border-emerald-200">
                  {t.presets[key].name}
                </button>
              ))}
            </div>
          </div>
        </div>
      </section>

      {/* Main grid */}
      <section className="mb-4 grid grid-cols-1 gap-4 lg:grid-cols-12">
        <div className="lg:col-span-7 space-y-4">
          <ScenarioCard title={t.baselineTitle} tint="bg-rose-50/40 border-rose-200"
            scen={baseline} setScen={setBaseline} t={t} locale={locale} />
          <ScenarioCard title={t.targetTitle} tint="bg-emerald-50/40 border-emerald-200"
            scen={target} setScen={setTarget} t={t} locale={locale} />
          <DigitalLeverPanel target={target} setTarget={setTarget} baseline={baseline} t={t} />
        </div>

        <div className="lg:col-span-5 space-y-3">
          <div className="grid grid-cols-2 gap-3">
            <KPI label={t.livesSaved} value={fmt(Math.max(0, livesSaved), locale)}
              sub={`${fmt(baseRun.survivors, locale)} → ${fmt(targetRun.survivors, locale)}`}
              tint="text-emerald-700" big />
            <KPI label={t.survivalRate} value={`${fmt(targetRun.survivalRate, locale, 0)}%`}
              sub={`${t.vs} ${fmt(baseRun.survivalRate, locale, 0)}% ${t.baselineShort}`}
              tint="text-emerald-700" big />
            <KPI label={t.costBaseline} value={fmtM(baseRun.cost, locale)}
              sub={`${fmt(totalCases, locale)} ${t.cases}`} tint="text-rose-700" />
            <KPI label={t.costTarget} value={fmtM(targetRun.cost, locale)}
              sub={costDelta <= 0 ? `${fmtM(Math.abs(costDelta), locale)} ${t.saved}` : `${fmtM(costDelta, locale)} ${t.more}`}
              tint={costDelta <= 0 ? "text-emerald-700" : "text-amber-700"} />
            <KPI label={t.costPerLife}
              value={costPerLife !== null ? fmtK(Math.abs(costPerLife), locale) : "—"}
              sub={costPerLife !== null && costPerLife < 0 ? t.costSaving : t.incremental}
              tint="text-slate-800" />
            <KPI label={t.costPerDaly}
              value={costPerDaly !== null ? fmtK(Math.abs(costPerDaly), locale) : "—"}
              sub={
                costPerDaly === null ? "—" :
                costPerDaly < 0 ? t.costSaving :
                costPerDaly <= threshold1x ? t.hce :
                costPerDaly <= threshold3x ? t.ce : t.aboveThr
              }
              tint={
                costPerDaly === null ? "text-slate-600" :
                costPerDaly <= threshold1x ? "text-emerald-700" :
                costPerDaly <= threshold3x ? "text-amber-700" : "text-rose-700"
              } />
          </div>

          {/* Threshold visual */}
          <div className="rounded-lg border border-slate-200 bg-white p-3 shadow-sm">
            <div className="mb-2 text-xs font-semibold uppercase tracking-wide text-slate-500">{t.benchmark}</div>
            <div className="relative h-8 overflow-hidden rounded bg-slate-100">
              <div className="absolute left-0 h-full w-1/3 bg-emerald-100" />
              <div className="absolute left-1/3 h-full w-1/3 bg-amber-100" />
              <div className="absolute left-2/3 h-full w-1/3 bg-rose-100" />
              {costPerDaly !== null && costPerDaly > 0 && (
                <div className="absolute top-0 h-full w-1 bg-slate-800"
                  style={{ left: `${Math.min(99, costPerDaly / (threshold3x * 1.5) * 100)}%` }}
                  title={`${fmtK(costPerDaly, locale)} / DALY`} />
              )}
            </div>
            <div className="mt-1 flex justify-between text-xs text-slate-500">
              <span>US$ 0</span>
              <span className="text-emerald-700">≤ 1× {t.gdpPc} (US$ {fmt(threshold1x, locale)})</span>
              <span className="text-amber-700">≤ 3× (US$ {fmt(threshold3x, locale)})</span>
              <span className="text-rose-700">{t.above}</span>
            </div>
          </div>

          {/* Stage comparator */}
          <div className="rounded-lg border border-slate-200 bg-white p-3 shadow-sm">
            <div className="mb-2 text-xs font-semibold uppercase tracking-wide text-slate-500">{t.stageComp}</div>
            <div className="space-y-3">
              <div>
                <div className="mb-1 flex items-center justify-between text-xs">
                  <span className="font-semibold text-rose-700">{t.baseline}</span>
                  <span className="text-slate-500">{fmt(baseRun.deaths, locale)} {t.deaths}</span>
                </div>
                <StageBar stages={baseline.stages} />
              </div>
              <div>
                <div className="mb-1 flex items-center justify-between text-xs">
                  <span className="font-semibold text-emerald-700">{t.target}</span>
                  <span className="text-slate-500">{fmt(targetRun.deaths, locale)} {t.deaths}</span>
                </div>
                <StageBar stages={target.stages} />
              </div>
            </div>
            <div className="mt-3 flex justify-around text-xs">
              {[0, 1, 2, 3].map((i) => (
                <span key={i} className={`stage-${i + 1}-text font-semibold`}>■ {t.stage[i]}</span>
              ))}
            </div>
          </div>
        </div>
      </section>

      {/* Footer / references */}
      <footer className="mt-8 border-t border-slate-200 pt-4 text-xs text-slate-600">
        <div className="mb-2 font-bold">{t.keyRefs}</div>
        <ul className="space-y-1 list-disc pl-5">
          <li>Zelle SG et al., <em>Cost-Effectiveness Analysis of Breast Cancer Control Interventions in Peru</em>, PLOS ONE 2013 — <a className="text-blue-700 hover:underline" href="https://journals.plos.org/plosone/article?id=10.1371/journal.pone.0082575" target="_blank" rel="noopener">link</a>.</li>
          <li>CanScreen5 Peru fact sheet (IARC) — <a className="text-blue-700 hover:underline" href="https://canscreen5.iarc.fr/?page=countryfactsheet&q=PER" target="_blank" rel="noopener">link</a>.</li>
          <li>GLOBOCAN 2022 Peru fact sheet — <a className="text-blue-700 hover:underline" href="https://gco.iarc.who.int/media/globocan/factsheets/populations/604-peru-fact-sheet.pdf" target="_blank" rel="noopener">link</a>.</li>
          <li>Nguyen et al., <em>mHealth Interventions to Improve Cancer Screening and Early Detection</em>, JMIR 2022 — <a className="text-blue-700 hover:underline" href="https://pmc.ncbi.nlm.nih.gov/articles/PMC9425170/" target="_blank" rel="noopener">link</a>.</li>
          <li>Farina G et al., <em>Telemammography — cost-effective approach in Argentina</em>, 2021 — <a className="text-blue-700 hover:underline" href="https://pmc.ncbi.nlm.nih.gov/articles/PMC8290945/" target="_blank" rel="noopener">link</a>.</li>
          <li>Lång K et al., <em>MASAI trial</em>, Lancet Digital Health 2024 — <a className="text-blue-700 hover:underline" href="https://www.thelancet.com/journals/landig/article/PIIS2589-7500(24)00267-X/fulltext" target="_blank" rel="noopener">link</a>.</li>
          <li>WHO — <em>Patient navigation for early detection, diagnosis and treatment of breast cancer: technical brief</em>, 2024 — <a className="text-blue-700 hover:underline" href="https://www.who.int/publications/i/item/9789240100954" target="_blank" rel="noopener">link</a>.</li>
        </ul>
        <div className="mt-3 text-slate-500">
          <strong>{t.caveatLabel}</strong> {t.caveatText}
        </div>
        <div className="mt-2 text-slate-500">{t.footerInfo}</div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
